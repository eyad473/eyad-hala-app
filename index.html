<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#1E1224">
<title>سَما</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1E1224;
    --bg-card:#2B1832;
    --bg-card-2:#33203B;
    --rose:#E3AFAE;
    --gold:#CDA35B;
    --cream:#F7ECE4;
    --muted:#B79FB0;
    --thread:#8A5C6B;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(ellipse at top, #3A2140 0%, var(--bg-deep) 55%),
      var(--bg-deep);
    color:var(--cream);
    font-family:'Tajawal',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ===== Header ===== */
  header{
    padding:22px 16px 18px;
    text-align:center;
    position:relative;
    flex-shrink:0;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .names{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    font-family:'Aref Ruqaa',serif;
  }
  .name{
    font-size:28px;
    font-weight:700;
    color:var(--cream);
    letter-spacing:1px;
  }
  .name.eyad{color:var(--gold);}
  .name.hala{color:var(--rose);}
  .thread-icon{
    width:34px;height:14px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .thread-icon svg{width:100%;height:100%;}
  .thread-icon path{
    stroke:var(--thread);
    stroke-width:1.5;
    fill:none;
    stroke-dasharray:4 3;
    animation:threadmove 3s linear infinite;
  }
  @keyframes threadmove{to{stroke-dashoffset:-14;}}
  .sub{
    margin-top:6px;
    font-size:12px;
    color:var(--muted);
    letter-spacing:2px;
  }
  .whoami{
    margin-top:14px;
    display:inline-flex;
    background:var(--bg-card);
    border:1px solid #4a2f52;
    border-radius:20px;
    padding:4px;
    gap:2px;
  }
  .whoami button{
    border:none;
    background:transparent;
    color:var(--muted);
    padding:7px 18px;
    border-radius:16px;
    font-family:'Tajawal',sans-serif;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
  }
  .whoami button.active.eyad{background:var(--gold);color:#221327;}
  .whoami button.active.hala{background:var(--rose);color:#221327;}

  /* ===== Chat area ===== */
  main{
    flex:1;
    overflow-y:auto;
    padding:10px 14px 20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:640px;
    width:100%;
    margin:0 auto;
  }
  .empty{
    margin:auto;
    text-align:center;
    color:var(--muted);
    font-size:14px;
    line-height:1.9;
  }
  .empty .big{
    font-family:'Aref Ruqaa',serif;
    font-size:22px;
    color:var(--rose);
    display:block;
    margin-bottom:6px;
  }
  .bubble-row{display:flex;width:100%;}
  .bubble-row.me{justify-content:flex-start;}
  .bubble-row.them{justify-content:flex-end;}
  .bubble{
    max-width:75%;
    padding:10px 14px;
    border-radius:18px;
    font-size:15px;
    line-height:1.6;
    position:relative;
    animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
  .bubble-row.me .bubble{
    background:#C13584;
    border:none;
    color:#fff;
    border-radius:20px;
  }
  .bubble-row.them .bubble{
    background:rgba(38,38,38,0.7);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.06);
    color:#fff;
    border-radius:20px;
  }
  .sender-tag{display:none;}
  .bubble img{
    max-width:100%;
    border-radius:12px;
    display:block;
    margin-top:4px;
  }
  .bubble .cap{margin-top:6px;}
  .meta{
    font-size:10px;
    color:var(--muted);
    margin-top:4px;
    text-align:left;
  }
  .sender-tag{
    font-size:11px;
    font-weight:700;
    margin-bottom:3px;
  }
  .bubble-row.me .sender-tag{color:var(--gold);}
  .bubble-row.them .sender-tag{color:var(--rose);}

  /* ===== Composer ===== */
  footer{
    flex-shrink:0;
    padding:12px 14px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, var(--bg-deep) 75%, transparent);
    max-width:640px;
    width:100%;
    margin:0 auto;
  }
  .composer{
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:6px 6px 6px 10px;
    display:flex;
    align-items:center;
    gap:4px;
    flex-wrap:nowrap;
    position:relative;
  }
  .composer input[type=text]{min-width:0;}
  .composer input[type=text]{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--cream);
    font-family:'Tajawal',sans-serif;
    font-size:15px;
    padding:8px 0;
  }
  .composer input::placeholder{color:var(--muted);}
  .icon-btn{
    width:38px;height:38px;
    border-radius:50%;
    border:none;
    background:var(--bg-card-2);
    color:var(--cream);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:.2s;
    font-size:17px;
  }
  .icon-btn:hover{filter:brightness(1.2);}
  .send-btn{
    background:linear-gradient(135deg,var(--gold),#b8863f);
    color:#221327;
  }
  .status{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
  }
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:#6fbf73;margin-left:5px;
  }
  .dot.off{background:#c0555a;}

  /* ===== Theme picker ===== */
  .theme-btn{
    position:absolute;left:16px;top:22px;
    width:32px;height:32px;border-radius:50%;
    border:1px solid #4a2f52;background:var(--bg-card);
    color:var(--cream);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .theme-panel{
    display:none;
    position:absolute;left:16px;top:60px;
    background:var(--bg-card);border:1px solid #4a2f52;
    border-radius:14px;padding:10px;z-index:40;gap:8px;
  }
  .theme-panel.open{display:flex;}
  .theme-swatch{
    width:30px;height:30px;border-radius:50%;cursor:pointer;
    border:2px solid transparent;
  }
  .theme-swatch.active{border-color:var(--cream);}

  /* ===== البحث داخل المحادثة ===== */
  .search-btn{
    position:absolute;left:56px;top:22px;
    width:32px;height:32px;border-radius:50%;
    border:1px solid #4a2f52;background:var(--bg-card);
    color:var(--cream);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .search-bar{
    display:none;
    align-items:center;gap:8px;
    padding:8px 14px;background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
  }
  .search-bar.open{display:flex;}
  .search-bar input{
    flex:1;background:var(--bg-card);border:1px solid #4a2f52;
    border-radius:14px;padding:7px 12px;color:var(--cream);
    font-family:'Tajawal',sans-serif;font-size:14px;outline:none;
  }
  .search-bar button{
    background:var(--bg-card);border:1px solid #4a2f52;color:var(--cream);
    border-radius:10px;width:30px;height:30px;font-size:13px;cursor:pointer;
  }
  .search-count{font-size:11px;color:var(--muted);white-space:nowrap;}
  .msg-highlight{outline:2px solid var(--gold);outline-offset:2px;}

  /* ===== زر العودة للأسفل ===== */
  .scroll-bottom-btn{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--bg-card);border:1px solid #4a2f52;color:var(--cream);
    width:38px;height:38px;border-radius:50%;font-size:16px;
    display:none;align-items:center;justify-content:center;
    z-index:30;box-shadow:0 4px 14px rgba(0,0,0,.4);cursor:pointer;
  }
  .scroll-bottom-btn.show{display:flex;}

  /* ===== زر النسخ وعداد الأحرف ===== */
  .copy-btn{
    position:absolute;top:6px;left:6px;
    background:rgba(0,0,0,.3);border:none;color:#fff;
    width:22px;height:22px;border-radius:6px;font-size:11px;
    display:none;align-items:center;justify-content:center;cursor:pointer;
  }
  .bubble:hover .copy-btn{display:flex;}
  .char-counter{
    position:absolute;top:-18px;left:14px;
    font-size:10px;color:var(--muted);white-space:nowrap;
  }

  /* ===== نجوم الليل ===== */
  .stars{
    position:fixed;inset:0;pointer-events:none;z-index:0;
    opacity:0;transition:opacity 2s;
  }
  .stars.on{opacity:1;}
  .star{
    position:absolute;background:#fff;border-radius:50%;
    animation:twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:.9;}}
  header, main, footer, .search-bar{position:relative;z-index:1;}

  /* ===== شريط المسافة ===== */
  .distance-row{
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:11px;color:var(--muted);margin-top:4px;
  }
  .distance-row .pulse-dot{
    width:5px;height:5px;border-radius:50%;background:var(--rose);
  }
  .distance-row.flash .pulse-dot{animation:distFlash 1s ease;}
    @keyframes distFlash{0%{box-shadow:0 0 0 0 rgba(227,175,174,.8);}100%{box-shadow:0 0 0 12px rgba(227,175,174,0);}}

  /* ===== الاحتفال (قلوب متطايرة) ===== */
  .float-heart{
    position:fixed;bottom:-40px;font-size:24px;z-index:99;
    pointer-events:none;
    animation:floatUp 3.4s ease-in forwards;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) rotate(0);opacity:1;}
    100%{transform:translateY(-110vh) rotate(30deg);opacity:0;}
  }

  /* ===== زر SOS ===== */
  .sos-btn{
    position:absolute;left:96px;top:22px;
    width:32px;height:32px;border-radius:50%;
    border:1px solid #c0555a;background:rgba(192,85,90,.15);
    color:#ff8a8f;font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .bubble.sos-bubble{
    background:linear-gradient(135deg,#c0555a,#8a2f35) !important;
    animation:sosPulse 1.2s ease 3;
  }
  @keyframes sosPulse{0%,100%{box-shadow:0 0 0 0 rgba(192,85,90,.6);}50%{box-shadow:0 0 0 14px rgba(192,85,90,0);}}

  /* ===== عداد الأيام ===== */
  .days-counter{
    font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:.5px;
  }

  /* ===== Typing indicator ===== */
  .typing-row{
    text-align:center;font-size:12px;color:var(--muted);
    padding:4px 0;font-style:italic;min-height:18px;
  }

  /* ===== Reactions ===== */
  .bubble{position:relative;}
  .reaction-badge{
    position:absolute;bottom:-10px;
    background:var(--bg-card-2);border:1px solid #4a2f52;
    border-radius:12px;padding:1px 6px;font-size:13px;
  }
  .bubble-row.me .reaction-badge{left:-6px;}
  .bubble-row.them .reaction-badge{right:-6px;}
  .react-popup{
    position:fixed;
    background:var(--bg-card);border:1px solid #4a2f52;
    border-radius:24px;padding:6px 10px;display:flex;gap:6px;
    z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.5);
    animation:pop .15s ease;
  }
  .react-popup span{font-size:20px;cursor:pointer;padding:2px;}

  /* ===== Voice recording ===== */
  .mic-btn.recording{
    background:#c0555a;animation:pulse 1s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .voice-bubble{display:flex;align-items:center;gap:8px;min-width:160px;}
  .voice-bubble audio{height:32px;max-width:180px;}

  /* ===== ميزات إضافية: رد، تعديل/حذف، شوفها، وسائط ===== */
  .quote-block{
    background:rgba(0,0,0,.25);
    border-right:3px solid rgba(255,255,255,.5);
    border-radius:8px;padding:5px 8px;margin-bottom:6px;
    font-size:12px;opacity:.85;
  }
  .bubble-row.them .quote-block{border-right-color:var(--rose);}
  .deleted-msg{font-style:italic;opacity:.6;font-size:13px;}
  .edited-tag{font-size:10px;opacity:.7;margin-right:4px;}
  .seen-tag{font-size:10px;color:var(--muted);text-align:left;margin-top:2px;}
  .media-bubble img, .media-bubble video{max-width:100%;border-radius:12px;display:block;}
  .reply-preview{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-card);border:1px solid #4a2f52;border-radius:12px;
    padding:8px 12px;margin-bottom:8px;font-size:13px;
  }
  .reply-preview .txt{opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .reply-preview button{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;}

  .wave-row{
    display:flex;align-items:center;justify-content:center;gap:4px;
    padding:8px 0;
  }
  .wave-bar{
    width:4px;height:8px;border-radius:2px;
    background:var(--rose);
    animation:wave 0.9s infinite ease-in-out;
  }
  .wave-bar:nth-child(1){animation-delay:0s;}
  .wave-bar:nth-child(2){animation-delay:.1s;}
  .wave-bar:nth-child(3){animation-delay:.2s;}
  .wave-bar:nth-child(4){animation-delay:.3s;}
  .wave-bar:nth-child(5){animation-delay:.2s;}
  .wave-bar:nth-child(6){animation-delay:.1s;}
  .wave-bar:nth-child(7){animation-delay:0s;}
  @keyframes wave{
    0%,100%{height:8px;}
    50%{height:26px;}
  }
  #recTimer{
    margin-right:10px;font-size:12px;color:var(--muted);
  }

  /* ===== Sticker editor modal ===== */
  .modal-bg{
    position:fixed;inset:0;background:rgba(15,8,18,.75);
    display:none;align-items:flex-end;justify-content:center;
    z-index:50;backdrop-filter:blur(3px);
  }
  .modal-bg.open{display:flex;}
  .modal{
    background:var(--bg-card);
    width:100%;max-width:640px;
    border-radius:22px 22px 0 0;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    border:1px solid #4a2f52;
    border-bottom:none;
    animation:slideup .25s ease;
  }
  @keyframes slideup{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h3{
    font-family:'Aref Ruqaa',serif;
    color:var(--rose);
    margin:0 0 12px;
    font-size:19px;
    text-align:center;
  }
  .tabs{display:flex;gap:6px;margin-bottom:12px;background:var(--bg-card-2);padding:4px;border-radius:14px;}
  .tabs button{
    flex:1;background:transparent;border:none;color:var(--muted);
    padding:8px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  }
  .tabs button.active{background:var(--gold);color:#221327;}
  #drawWrap{display:none;}
  #drawWrap.active{display:block;}
  #uploadWrap{display:none;}
  #uploadWrap.active{display:block;}
  canvas{
    width:100%;aspect-ratio:1/1;
    background:#fff;
    border-radius:14px;
    touch-action:none;
    display:block;
  }
  .draw-tools{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;
  }
  .swatch.active{border-color:var(--cream);}
  .drop{
    border:2px dashed #4a2f52;border-radius:14px;padding:30px 10px;text-align:center;
    color:var(--muted);cursor:pointer;font-size:13px;
  }
  .drop img{max-width:100%;max-height:200px;border-radius:10px;margin-top:10px;}
  .cap-input{
    width:100%;margin-top:12px;background:var(--bg-card-2);border:1px solid #4a2f52;
    border-radius:12px;padding:10px 12px;color:var(--cream);font-family:'Tajawal',sans-serif;font-size:14px;
  }
  .modal-actions{display:flex;gap:8px;margin-top:14px;}
  .btn{
    flex:1;padding:12px;border-radius:14px;border:none;font-family:'Tajawal',sans-serif;
    font-weight:700;font-size:14px;cursor:pointer;
  }
  .btn.cancel{background:var(--bg-card-2);color:var(--muted);}
  .btn.confirm{background:linear-gradient(135deg,var(--rose),#b98486);color:#221327;}
</style>
</head>
<body>

<!-- ===== بوابة سَما التمويهية ===== -->
<div id="gateScreen" style="position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,#0D1426,#1E3454);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;font-family:'Tajawal',sans-serif;">
  <div id="gateStars" style="position:absolute;inset:0;pointer-events:none;"></div>
  <div style="font-size:64px;">🌙</div>
  <div style="font-family:'Aref Ruqaa',serif;font-size:38px;color:#F3CE80;letter-spacing:2px;">سَما</div>
  <div style="color:#8FA8C9;font-size:14px;">وين حابب تسرح الليلة؟</div>
  <div style="display:flex;gap:18px;">
    <button id="gateMoon" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#EAF1FB;padding:14px 30px;border-radius:18px;font-family:'Tajawal',sans-serif;font-size:16px;cursor:pointer;backdrop-filter:blur(8px);">القمر 🌕</button>
    <button id="gateStarsBtn" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#EAF1FB;padding:14px 30px;border-radius:18px;font-family:'Tajawal',sans-serif;font-size:16px;cursor:pointer;backdrop-filter:blur(8px);">النجوم ✨</button>
  </div>
</div>

<!-- ===== لعبة التقاط النجوم (تمويه) ===== -->
<div id="gameScreen" style="display:none;position:fixed;inset:0;z-index:190;background:linear-gradient(180deg,#0D1426,#1E3454);font-family:'Tajawal',sans-serif;overflow:hidden;">
  <div style="position:absolute;top:16px;right:16px;color:#F3CE80;font-size:18px;z-index:5;">النقاط: <span id="gameScore">0</span></div>
  <button id="gameBack" style="position:absolute;top:12px;left:12px;z-index:5;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#EAF1FB;padding:6px 16px;border-radius:12px;font-family:'Tajawal',sans-serif;cursor:pointer;">رجوع</button>
  <div style="position:absolute;top:50px;width:100%;text-align:center;color:#8FA8C9;font-size:13px;">القط النجوم قبل ما تختفي ✨</div>
</div>

<div class="stars" id="starsLayer"></div>
<header>
  <button class="theme-btn" id="themeBtn">🎨</button>
  <button class="search-btn" id="searchBtn">🔍</button>
  <button class="sos-btn" id="sosBtn" title="محتاجتك هلأ">🚨</button>
  <div class="theme-panel" id="themePanel">
    <span class="theme-swatch" data-theme="purple" style="background:linear-gradient(135deg,#E3AFAE,#CDA35B)"></span>
    <span class="theme-swatch" data-theme="night" style="background:linear-gradient(135deg,#6C8EBF,#2B3A55)"></span>
    <span class="theme-swatch" data-theme="dawn" style="background:linear-gradient(135deg,#F4A6B7,#F7D6B0)"></span>
    <span class="theme-swatch" data-theme="sea" style="background:linear-gradient(135deg,#4FB8AE,#2E5C6B)"></span>
  </div>
  <div class="names">
    <span class="name eyad">إياد</span>
    <span class="thread-icon"><svg viewBox="0 0 34 14"><path d="M0 7 Q 8 0, 17 7 T 34 7"/></svg></span>
    <span class="name hala">حلا</span>
  </div>
  <div class="sub">خيط بيوصل بين غزة ونابلس</div>
  <div class="distance-row" id="distanceRow">
    <span>غزة</span><span class="pulse-dot"></span><span id="distanceText">~93 كم</span><span class="pulse-dot"></span><span>نابلس</span>
  </div>

<script>
const FN = '/api';
let ME = localStorage.getItem('eh_who') || 'eyad';
let lastCount = 0;
let poller = null;

const chatEl = document.getElementById('chat');
const emptyState = document.getElementById('emptyState');
const btnEyad = document.getElementById('btnEyad');
const btnHala = document.getElementById('btnHala');
const statusDot = document.getElementById('statusDot');

function setWho(who){
  ME = who;
  localStorage.setItem('eh_who', who);
  btnEyad.classList.toggle('active', who==='eyad');
  btnHala.classList.toggle('active', who==='hala');
  document.getElementById('modalTarget').textContent = who==='eyad' ? 'حلا' : 'إياد';
  const nb = document.getElementById('notifBtn');
  if(nb) nb.textContent = localStorage.getItem('eh_notif_' + who) === '1' ? '🔔 الإشعارات مفعّلة ✓' : '🔔 فعّل الإشعارات';
  lastCount = -1;
  loadMessages();
}
btnEyad.onclick = ()=>setWho('eyad');
btnHala.onclick = ()=>setWho('hala');

function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
  }

function showReactPopup(x, y, msg){
  document.querySelectorAll('.react-popup').forEach(p=>p.remove());
  const popup = document.createElement('div');
  popup.className = 'react-popup';
  popup.style.left = Math.max(8, x-110) + 'px';
  popup.style.top = (y-54) + 'px';

  ['❤️','😂','😮','😢','👍','🔥'].forEach(emoji=>{
    const span = document.createElement('span');
    span.textContent = emoji;
    span.onclick = async (ev)=>{
      ev.stopPropagation();
      popup.remove();
      try{
        const res = await fetch(`${FN}/react`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({messageId: msg.id, emoji, from: ME})
        });
        if(!res.ok){
          const errData = await res.json().catch(()=>({}));
          alert('ما انضاف الرد: ' + (errData.error || res.status));
          return;
        }
        lastCount = -1;
        loadMessages();
      }catch(e){
        alert('صار خطأ بإضافة الرد: ' + e.message);
      }
    };
    popup.appendChild(span);
  });

  const replySpan = document.createElement('span');
  replySpan.textContent = '↩️';
  replySpan.title = 'رد';
  replySpan.onclick = ()=>{ popup.remove(); setReply(msg); };
  popup.appendChild(replySpan);

  if(msg.from === ME && !msg.deleted){
    const editSpan = document.createElement('span');
    editSpan.textContent = '✏️';
    editSpan.title = 'تعديل';
    editSpan.onclick = async ()=>{
      popup.remove();
      if(msg.type !== 'text'){ alert('بس الرسائل النصية ممكن نعدلها'); return; }
      const newText = prompt('عدّل الرسالة:', msg.text);
      if(newText === null) return;
      await fetch(`${FN}/editDelete`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'edit', messageId: msg.id, from: ME, newText})
      });
      lastCount = -1;
      loadMessages();
    };
    popup.appendChild(editSpan);

    const delSpan = document.createElement('span');
    delSpan.textContent = '🗑';
    delSpan.title = 'حذف';
    delSpan.onclick = async ()=>{
      popup.remove();
      if(!confirm('متأكد بدك تحذف الرسالة؟')) return;
      await fetch(`${FN}/editDelete`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'delete', messageId: msg.id, from: ME})
      });
      lastCount = -1;
      loadMessages();
    };
    popup.appendChild(delSpan);
  }

  document.body.appendChild(popup);
  setTimeout(()=>{
    document.addEventListener('click', function closeOnce(){
      popup.remove();
      document.removeEventListener('click', closeOnce);
    }, {once:true});
  }, 50);
}

function render(list){
  if(!list.length){
    chatEl.innerHTML = '';
    chatEl.appendChild(emptyState);
    return;
  }
  chatEl.innerHTML = '';

  // آخر رسالة إلي أنا بعتها، حتى نحط عليها "شوفها"
  let lastMineIdx = -1;
  list.forEach((m,i)=>{ if(m.from === ME) lastMineIdx = i; });

  list.forEach((m, i)=>{
    const row = document.createElement('div');
    row.className = 'bubble-row ' + (m.from === ME ? 'me' : 'them');
    row.id = 'msg-' + m.id;
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (m.sos ? ' sos-bubble' : '');
    const tag = document.createElement('div');
    tag.className = 'sender-tag';
    tag.textContent = m.from === 'eyad' ? 'إياد' : 'حلا';
    bubble.appendChild(tag);

    if(m.replyTo){
      const q = document.createElement('div');
      q.className = 'quote-block';
      const qName = m.replyTo.from === 'eyad' ? 'إياد' : 'حلا';
      q.textContent = qName + ': ' + m.replyTo.snippet;
      bubble.appendChild(q);
    }

    if(m.deleted){
      const d = document.createElement('div');
      d.className = 'deleted-msg';
      d.textContent = '🚫 تم حذف هذه الرسالة';
      bubble.appendChild(d);
    } else if(m.type === 'sticker' && m.image){
      const img = document.createElement('img');
      img.src = m.image;
      bubble.appendChild(img);
      if(m.text){
        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = m.text;
        bubble.appendChild(cap);
      }
    } else if(m.type === 'voice' && m.audio){
      const vw = document.createElement('div');
      vw.className = 'voice-bubble';
      vw.innerHTML = '🎤';
      const audio = document.createElement('audio');
      audio.src = m.audio;
      audio.controls = true;
      vw.appendChild(audio);
      bubble.appendChild(vw);
    } else if(m.type === 'media' && m.media){
      const mw = document.createElement('div');
      mw.className = 'media-bubble';
      if(m.mediaType === 'video'){
        const v = document.createElement('video');
        v.src = m.media; v.controls = true;
        mw.appendChild(v);
      } else {
        const img = document.createElement('img');
        img.src = m.media;
        mw.appendChild(img);
      }
      bubble.appendChild(mw);
      if(m.text){
        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = m.text;
        bubble.appendChild(cap);
      }
    } else {
      bubble.style.position = 'relative';
      const txt = document.createElement('div');
      txt.textContent = m.text;
      txt.setAttribute('data-msg-text', '1');
      bubble.appendChild(txt);
      if(m.text){
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '📋';
        copyBtn.title = 'نسخ';
        copyBtn.onclick = (ev)=>{
          ev.stopPropagation();
          navigator.clipboard.writeText(m.text).then(()=>{
            copyBtn.textContent = '✓';
            setTimeout(()=>copyBtn.textContent='📋', 1200);
          }).catch(()=>{});
        };
        bubble.appendChild(copyBtn);
      }
    }

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = (m.edited ? 'معدّلة · ' : '') + fmtTime(m.timestamp);
    bubble.appendChild(meta);

    if(m.reaction){
      const badge = document.createElement('div');
      badge.className = 'reaction-badge';
      badge.textContent = m.reaction;
      bubble.appendChild(badge);
    }

    if(!m.deleted && m.id && !String(m.id).startsWith('pending-')){
      let pressTimer;
      const startPress = (e)=>{
        const point = e.touches ? e.touches[0] : e;
        pressTimer = setTimeout(()=>showReactPopup(point.clientX, point.clientY, m), 450);
      };
      const cancelPress = ()=>clearTimeout(pressTimer);
      bubble.addEventListener('mousedown', startPress);
      bubble.addEventListener('touchstart', startPress);
      bubble.addEventListener('mouseup', cancelPress);
      bubble.addEventListener('mouseleave', cancelPress);
      bubble.addEventListener('touchend', cancelPress);
      bubble.addEventListener('touchmove', cancelPress);

      // دبل تاب/دبل كليك = قلب سريع
      let lastTap = 0;
      const handleDoubleTap = async ()=>{
        const now = Date.now();
        if(now - lastTap < 320){
          await fetch(`${FN}/react`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({messageId: m.id, emoji: '❤️', from: ME})
          });
          lastCount = -1;
          loadMessages();
        }
        lastTap = now;
      };
      bubble.addEventListener('touchend', handleDoubleTap);
      bubble.addEventListener('dblclick', async ()=>{
        await fetch(`${FN}/react`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({messageId: m.id, emoji: '❤️', from: ME})
        });
        lastCount = -1;
        loadMessages();
      });
    }

    row.appendChild(bubble);
    chatEl.appendChild(row);

    if(i === lastMineIdx && m.from === ME){
      const seenRow = document.createElement('div');
      seenRow.className = 'seen-tag';
      seenRow.id = 'seenTagRow';
      row.appendChild(seenRow);
    }
  });
  chatEl.scrollTop = chatEl.scrollHeight;
  updateSeenTag();
}

let lastSnapshot = '';
let seenData = { eyad: 0, hala: 0 };

function updateSeenTag(){
  const row = document.getElementById('seenTagRow');
  if(!row || !localMessages.length) return;
  let lastMineIdx = -1;
  localMessages.forEach((m,i)=>{ if(m.from === ME) lastMineIdx = i; });
  if(lastMineIdx === -1) return;
  const lastMineMsg = localMessages[lastMineIdx];
  const otherKey = ME === 'eyad' ? 'hala' : 'eyad';
  const otherSeenTs = seenData[otherKey] || 0;
  row.textContent = (otherSeenTs >= lastMineMsg.timestamp) ? 'تمت المشاهدة ✓✓' : 'وصلت ✓';
}

async function checkSeen(){
  if(document.visibilityState !== 'visible') return;
  try{
    const res = await fetch(`${FN}/seen`);
    seenData = await res.json();
    updateSeenTag();
  }catch(e){}
}
setInterval(checkSeen, 5000); // قراءة، رخيصة (100 ألف/يوم)

let lastMarkSeen = 0;
async function markSeen(){
  const now = Date.now();
  // كتابة نادرة قصداً: بحد أقصى مرة كل 25 ثانية (حماية لحد الكتابة اليومي على Cloudflare)
  if(document.visibilityState !== 'visible' || now - lastMarkSeen < 25000) return;
  lastMarkSeen = now;
  try{
    await fetch(`${FN}/seen`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({who: ME})
    });
  }catch(e){}
}
setInterval(markSeen, 25000);

async function loadMessages(){
  if(document.visibilityState !== 'visible') return;
  try{
    const res = await fetch(`${FN}/messages`);
    if(!res.ok) throw new Error('bad');
    const list = await res.json();
    statusDot.classList.remove('off');
    const snap = JSON.stringify(list);
    if(snap !== lastSnapshot){
      lastSnapshot = snap;
      lastCount = list.length;
      localMessages = list;
      render(list);
      try{ localStorage.setItem('eh_cache_messages', snap); }catch(e){}
    }
  }catch(e){
    statusDot.classList.add('off');
  }
}

let localMessages = [];

async function sendMessage(payload){
  // نعرض الرسالة فوراً بدون ما نستنى السيرفر (عرض تفاؤلي)
  const optimistic = {
    id: 'pending-' + Date.now(),
    from: ME,
    text: payload.text || '',
    image: payload.type === 'sticker' ? payload.image : null,
    audio: payload.type === 'voice' ? payload.audio : null,
    media: payload.type === 'media' ? payload.media : null,
    mediaType: payload.type === 'media' ? payload.mediaType : null,
    replyTo: payload.replyTo || null,
    sos: payload.sos || false,
    type: payload.type || 'text',
    timestamp: Date.now()
  };
  localMessages.push(optimistic);
  render(localMessages);

  try{
    const res = await fetch(`${FN}/send`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({from: ME, ...payload})
    });
    if(!res.ok) throw new Error('failed');
      lastCount = -1;
    loadMessages();
  } catch(e){
    alert('ما انبعتت الرسالة، جرب كمان مرة 🤍');
    localMessages = localMessages.filter(m => m.id !== optimistic.id);
    render(localMessages);
  }
}

document.getElementById('sendBtn').onclick = ()=>{
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  const payload = {text, type:'text'};
  if(replyingTo){ payload.replyTo = replyingTo; }
  sendMessage(payload);
  clearReply();
};
document.getElementById('textInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('sendBtn').click();
});

/* ===== الرد على رسالة ===== */
let replyingTo = null;
function setReply(msg){
  replyingTo = {
    id: msg.id,
    from: msg.from,
    snippet: msg.type==='sticker' ? '🎨 ستيكر' : msg.type==='voice' ? '🎤 رسالة صوتية' : msg.type==='media' ? '📷 وسائط' : (msg.text || '').slice(0,60)
  };
  const senderName = msg.from==='eyad' ? 'إياد' : 'حلا';
  document.getElementById('replyPreviewText').textContent = 'رد على ' + senderName + ': ' + replyingTo.snippet;
  document.getElementById('replyPreview').style.display = 'flex';
  document.getElementById('textInput').focus();
}
function clearReply(){
  replyingTo = null;
  document.getElementById('replyPreview').style.display = 'none';
}
document.getElementById('cancelReply').onclick = clearReply;

/* ===== Sticker modal ===== */
const modalBg = document.getElementById('modalBg');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing=false, color='#221327';
ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.lineWidth=8; ctx.lineCap='round'; ctx.lineJoin='round';

function getPos(e){
  const r = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return {x: cx * canvas.width / r.width, y: cy * canvas.height / r.height};
}
function start(e){ drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault();}
function move(e){ if(!drawing) return; const p=getPos(e); ctx.strokeStyle=color; ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault();}
function end(){ drawing=false; }
canvas.addEventListener('mousedown', start);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
canvas.addEventListener('touchstart', start);
canvas.addEventListener('touchmove', move);
canvas.addEventListener('touchend', end);

document.querySelectorAll('.swatch').forEach(sw=>{
  sw.onclick = ()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    color = sw.dataset.c;
  };
});
document.getElementById('clearCanvas').onclick = ()=>{
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
};

const tabDraw = document.getElementById('tabDraw');
const tabUpload = document.getElementById('tabUpload');
const drawWrap = document.getElementById('drawWrap');
const uploadWrap = document.getElementById('uploadWrap');
tabDraw.onclick = ()=>{
  tabDraw.classList.add('active'); tabUpload.classList.remove('active');
  drawWrap.classList.add('active'); uploadWrap.classList.remove('active');
};
tabUpload.onclick = ()=>{
  tabUpload.classList.add('active'); tabDraw.classList.remove('active');
  uploadWrap.classList.add('active'); drawWrap.classList.remove('active');
};

let uploadedImage = null;
let uploadedIsVideo = false;
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.onclick = ()=>fileInput.click();
fileInput.onchange = ()=>{
  const file = fileInput.files[0];
  if(!file) return;
  uploadedIsVideo = file.type.startsWith('video/');
  const reader = new FileReader();
  reader.onload = ()=>{
    uploadedImage = reader.result;
    document.getElementById('preview').innerHTML = uploadedIsVideo
      ? `<video src="${uploadedImage}" controls style="max-width:100%;max-height:200px;border-radius:10px;margin-top:10px;"></video>`
      : `<img src="${uploadedImage}">`;
  };
  reader.readAsDataURL(file);

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function enableNotifications(){
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    alert('المتصفح ما بيدعم الإشعارات 😔');
    return;
  }
  try{
    const reg = await navigator.serviceWorker.register('/sw.js');
    const perm = await Notification.requestPermission();
    if(perm !== 'granted'){
      alert('لازم توافق على الإذن حتى توصلك الإشعارات');
      return;
    }
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    await fetch(`${FN}/subscribe`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ who: ME, subscription: sub })
    });
    document.getElementById('notifBtn').textContent = '🔔 الإشعارات مفعّلة ✓';
    localStorage.setItem('eh_notif_' + ME, '1');
  } catch(e){
    alert('صار خطأ بتفعيل الإشعارات، جرب كمان مرة');
  }
}

/* ===== الرسائل الصوتية ===== */
let mediaRecorder, audioChunks = [], isRecording = false, recStartTime, recTimerInt;
const micBtn = document.getElementById('micBtn');
const waveRow = document.getElementById('waveRow');
const recTimerEl = document.getElementById('recTimer');

function pickMimeType(){
  const candidates = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/aac'];
  for(const c of candidates){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
  }
  return ''; // خلي المتصفح يختار الافتراضي
}

function formatTimer(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const ss = String(s%60).padStart(2,'0');
  return `${m}:${ss}`;
}

micBtn.onclick = async ()=>{
  if(!isRecording){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert('المتصفح ما بيدعم تسجيل الصوت 😔 جرب تفتح الموقع بمتصفح Safari أو Chrome محدّث');
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = pickMimeType();
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (e)=>{ if(e.data && e.data.size > 0) audioChunks.push(e.data); };

      mediaRecorder.onstop = ()=>{
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(recTimerInt);
        waveRow.style.display = 'none';

        if(!audioChunks.length){
          alert('ما انسجل صوت، جرب كمان مرة 🎤');
          return;
        }
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/mp4' });
        if(blob.size === 0){
          alert('التسجيل طلع فاضي، جرب كمان مرة');
          return;
        }
        const reader = new FileReader();
        reader.onload = ()=>{
            sendMessage({ type:'voice', audio: reader.result, text:'' });
        };
        reader.onerror = ()=> alert('صار خطأ بمعالجة التسجيل، جرب كمان مرة');
        reader.readAsDataURL(blob);
      };

      mediaRecorder.onerror = ()=>{
        alert('صار خطأ أثناء التسجيل، جرب كمان مرة');
        isRecording = false;
        micBtn.classList.remove('recording');
        micBtn.textContent = '🎤';
        waveRow.style.display = 'none';
        clearInterval(recTimerInt);
      };

      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹';
      waveRow.style.display = 'flex';
      recStartTime = Date.now();
      recTimerEl.textContent = '0:00';
      recTimerInt = setInterval(()=>{
        const elapsed = Date.now() - recStartTime;
        recTimerEl.textContent = formatTimer(elapsed);
        if(elapsed > 60000){ // حد أقصى دقيقة وحدة
          mediaRecorder.stop();
          isRecording = false;
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
        }
      }, 300);
    }catch(e){
      alert('لازم توافق على إذن الميكروفون حتى نسجل صوت 🎤');
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
  }
};

const searchBtn = document.getElementById('searchBtn');
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
let searchMatches = [];
let searchIdx = -1;

searchBtn.onclick = ()=>{
  searchBar.classList.toggle('open');
  if(searchBar.classList.contains('open')) searchInput.focus();
};
document.getElementById('searchClose').onclick = ()=>{
  searchBar.classList.remove('open');
  clearSearchHighlights();
  searchInput.value = '';
  searchCount.textContent = '';
};

function clearSearchHighlights(){
  document.querySelectorAll('.msg-highlight').forEach(el=>el.classList.remove('msg-highlight'));
}

function runSearch(){
  clearSearchHighlights();
  const q = searchInput.value.trim();
  searchMatches = [];
  searchIdx = -1;
  if(!q){ searchCount.textContent=''; return; }
  const lower = q.toLowerCase();
  localMessages.forEach(m=>{
    if(!m.deleted && m.text && m.text.toLowerCase().includes(lower)){
      searchMatches.push(m.id);
    }
  });
  if(searchMatches.length){
    searchIdx = 0;
    jumpToMatch();
  }
  searchCount.textContent = searchMatches.length ? `${searchIdx+1}/${searchMatches.length}` : 'ما في نتائج';
}

function jumpToMatch(){
  if(searchIdx < 0 || searchIdx >= searchMatches.length) return;
  clearSearchHighlights();
  const el = document.getElementById('msg-' + searchMatches[searchIdx]);
  if(el){
    el.scrollIntoView({behavior:'smooth', block:'center'});
    const bubble = el.querySelector('.bubble');
    if(bubble) bubble.classList.add('msg-highlight');
  }
  searchCount.textContent = `${searchIdx+1}/${searchMatches.length}`;
}

searchInput.addEventListener('input', runSearch);
document.getElementById('searchNext').onclick = ()=>{
  if(!searchMatches.length) return;
  searchIdx = (searchIdx + 1) % searchMatches.length;
  jumpToMatch();
};
document.getElementById('searchPrev').onclick = ()=>{
  if(!searchMatches.length) return;
  searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
  jumpToMatch();
};
